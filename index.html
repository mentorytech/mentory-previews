<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentory Previews</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #d4af37, #f4e4bc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .section { margin-bottom: 40px; }
        .section h2 { font-size: 1.2rem; color: #d4af37; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; transition: all 0.3s; }
        .card:hover { border-color: #d4af37; transform: translateY(-2px); }
        .card a { color: #fff; text-decoration: none; display: block; }
        .card .title { font-weight: 600; margin-bottom: 5px; }
        .card .desc { font-size: 0.85rem; color: #888; }
        .empty { color: #555; font-style: italic; }
        footer { margin-top: 60px; text-align: center; color: #555; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mentory Previews</h1>
        <p class="subtitle">Dashboards, Landing Pages e Relatórios | Mentory International®</p>
        
        <div class="section">
            <h2>📊 Dashboards</h2>
            <div class="grid" id="dashboards">
                <div class="card">
                    <a href="dashboards/elevation-analytics.html">
                        <div class="title">Elevation Analytics</div>
                        <div class="desc">Engajamento e métricas do programa</div>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>🎯 Landing Pages</h2>
            <div class="grid" id="landing-pages">
                <p class="empty">Em breve...</p>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 Relatórios</h2>
            <div class="grid" id="reports">
                <p class="empty">Em breve...</p>
            </div>
        </div>
        
        <footer>
            Atualizado automaticamente por Éden | AI COO Mentory International®
        </footer>
    </div>
</body>
</html>
